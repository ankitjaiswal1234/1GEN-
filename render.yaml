services:
  - type: web
    name: 1gen-chat-by-ai
    env: node
    plan: free
    buildCommand: npm install && node seed-user.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: FEATURE_EMAIL_VERIFICATION
        value: "true"
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_PATH
        value: "./data/1gen-chat-by-ai.db"
      - key: JWT_EXPIRY
        value: "7d"
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: SESSION_TIMEOUT
        value: "86400000"
      - key: OTP_EXPIRY
        value: "600000"
      - key: FEATURE_LOGIN_TRACKING
        value: "true"
      - key: FEATURE_GEOLOCATION
        value: "true"
