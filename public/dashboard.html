
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1GEN CHAT BY AI - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.9);
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .category-card:hover::before {
            left: 100%;
        }

        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .category-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: inline-block;
        }

        .category-card h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .category-card p {
            font-size: 0.95em;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .category-card:hover p {
            opacity: 1;
        }

        .logout-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            transform: scale(1.05);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-card:nth-child(1) {
            animation: slideDown 0.6s ease-out 0.1s both;
        }

        .category-card:nth-child(2) {
            animation: slideDown 0.6s ease-out 0.2s both;
        }

        .category-card:nth-child(3) {
            animation: slideDown 0.6s ease-out 0.3s both;
        }

        .category-card:nth-child(4) {
            animation: slideDown 0.6s ease-out 0.4s both;
        }

        .category-card:nth-child(5) {
            animation: slideDown 0.6s ease-out 0.5s both;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .categories {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 1GEN CHAT BY AI</h1>
            <p>Select a category to start your video chat</p>
        </div>

        <div class="categories">
            <a href="video.html?room=movie" class="category-card">
                <div class="category-icon">🎭</div>
                <h2>Movie</h2>
                <p>Watch and discuss movies</p>
            </a>

            <a href="video.html?room=study" class="category-card">
                <div class="category-icon">📚</div>
                <h2>Study</h2>
                <p>Educational content</p>
            </a>

            <a href="video.html?room=engineering" class="category-card">
                <div class="category-icon">⚙️</div>
                <h2>Engineering</h2>
                <p>Technical discussions</p>
            </a>

            <a href="video.html?room=consulting" class="category-card">
                <div class="category-icon">💼</div>
                <h2>Consulting</h2>
                <p>Professional advice</p>
            </a>

            <a href="video.html?room=random" class="category-card">
                <div class="category-icon">🎲</div>
                <h2>Random</h2>
                <p>Surprise content</p>
            </a>
        </div>

        <div style="text-align: center;">
            <a href="login.html" class="logout-btn">Logout</a>
        </div>
    </div>
</body>
</html>
